<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Мониторинг рабочего дня</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0B1321;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #C7CCD3;
        }
        .login-card {
            max-width: 380px;
            width: 100%;
            background: #111827;
            border-radius: 16px;
            border: 1px solid rgba(53,92,138,0.3);
            padding: 40px 32px;
        }
        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #355C8A, #D4AF7A);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 24px;
            color: #fff;
            margin: 0 auto 20px;
        }
        h1 {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }
        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #6B7280;
            margin-bottom: 32px;
        }
        .error-msg {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #F87171;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            text-align: center;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #9CA3AF;
            margin-bottom: 6px;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            background: rgba(55,65,81,0.3);
            border: 1px solid rgba(55,65,81,0.5);
            border-radius: 8px;
            color: #fff;
            font-family: 'Manrope', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="password"]:focus {
            border-color: #355C8A;
            background: rgba(55,65,81,0.4);
        }
        input[type="password"]::placeholder { color: #4B5563; }
        .btn-login {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: linear-gradient(135deg, #355C8A, #2d4f78);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'Manrope', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #3d6a9e, #355C8A);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-icon">М</div>
        <h1>Мониторинг рабочего дня</h1>
        <div class="subtitle">Дашборд директора</div>
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login">
            <label>Пароль</label>
            <input type="password" name="password" placeholder="Введите пароль" autofocus required>
            <button type="submit" class="btn-login">Войти</button>
        </form>
    </div>
</body>
</html>
